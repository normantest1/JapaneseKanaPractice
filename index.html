<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日语五十音练习 - Web Speech</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .timer {
      position: absolute;
      top: 30px;
      right: 30px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 10px 20px;
      border-radius: 25px;
      font-size: 24px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      color: #667eea;
      font-size: 32px;
      margin: 0;
    }

    .category-selector {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
      margin-bottom: 30px;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 10px;
    }

    .category-selector label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 8px;
      border-radius: 5px;
      transition: background 0.2s;
    }

    .category-selector label:hover {
      background: #e9ecef;
    }

    .category-selector input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .display-area {
      margin-bottom: 30px;
    }

    .card {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      border-radius: 15px;
      padding: 40px;
      margin-bottom: 20px;
      min-height: 120px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 10px 30px rgba(240, 147, 251, 0.3);
      transition: all 0.3s ease;
    }

    .card.top-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
    }

    .card.bottom-card {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    }

    .card.bottom-card.revealed {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      box-shadow: 0 10px 30px rgba(79, 172, 254, 0.3);
    }

    .card-content {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      width: 100%;
    }

    .display-text {
      font-size: 64px;
      font-weight: bold;
      color: white;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
    }

    .display-text.hidden {
      filter: blur(10px);
      user-select: none;
    }

    .placeholder {
      color: rgba(255, 255, 255, 0.7);
      font-size: 24px;
    }

    .speaker-btn {
      background: white;
      border: none;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      font-size: 24px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    .speaker-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
    }

    .controls {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .btn {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: bold;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }

    .btn-answer {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(240, 147, 251, 0.4);
    }

    .btn-answer:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(240, 147, 251, 0.6);
    }

    .btn-next {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
    }

    .btn-next:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(79, 172, 254, 0.6);
    }

    .progress {
      text-align: center;
      color: #666;
      font-size: 14px;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: #e9ecef;
      border-radius: 4px;
      margin-top: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      transition: width 0.3s ease;
    }

    .voice-status {
      text-align: center;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-weight: bold;
    }

    .voice-status.success {
      background: #d4edda;
      color: #155724;
    }

    .voice-status.warning {
      background: #fff3cd;
      color: #856404;
    }

    .voice-status.error {
      background: #f8d7da;
      color: #721c24;
    }

    .favorite-btn {
      background: white;
      border: none;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      font-size: 24px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      margin-left: 10px;
    }

    .favorite-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
    }

    .favorite-btn.favorited {
      background: #fff3cd;
    }

    .card-content-wrapper {
      display: flex;
      align-items: center;
    }
  </style>
</head>

    let currentData = []

    let timerInterval = null

    let selectedVoice = null

    const FAVORITES_KEY = 'kanaFavorites'

    function getFavorites() {
      const stored = localStorage.getItem(FAVORITES_KEY)
      return stored ? JSON.parse(stored) : []
    }

    function saveFavorites(favorites) {
      localStorage.setItem(FAVORITES_KEY, JSON.stringify(favorites))
    }

    function isFavorited(item) {
      const favorites = getFavorites()
      return favorites.some(f => f.romaji === item.romaji && f.kana === item.kana)
    }

    function toggleFavorite(item) {
      const favorites = getFavorites()
      const index = favorites.findIndex(f => f.romaji === item.romaji && f.kana === item.kana)
      if (index > -1) {
        favorites.splice(index, 1)
      } else {
        favorites.push({ romaji: item.romaji, kana: item.kana })
      }
      saveFavorites(favorites)
      return index === -1
    }

    function checkSpeechAPI() {
      if ('speechSynthesis' in window) {
        loadVoices()
        return true
      } else {
        elements.voiceStatus.className = 'voice-status error'
        elements.voiceStatus.textContent = '❌ 浏览器不支持 Web Speech API'
        return false
      }
    }

    function loadVoices() {
      function displayVoices() {
        const voices = speechSynthesis.getVoices()
        const japaneseVoices = voices.filter(v => 
          v.lang && (v.lang.startsWith('ja') || v.lang.includes('ja'))
        )

        if (japaneseVoices.length > 0) {
          selectedVoice = japaneseVoices[0]
          elements.voiceStatus.className = 'voice-status success'
          elements.voiceStatus.textContent = `✅ 找到日语语音: ${selectedVoice.name}`
        } else {
          elements.voiceStatus.className = 'voice-status warning'
          elements.voiceStatus.textContent = '⚠️ 未找到日语语音，将使用默认语音'
        }
      }

      if (speechSynthesis.getVoices().length > 0) {
        displayVoices()
      } else {
        speechSynthesis.onvoiceschanged = displayVoices
        setTimeout(displayVoices, 1000)
      }
    }

    function speak(text) {
      if (!('speechSynthesis' in window)) {
        alert('浏览器不支持语音合成')
        return
      }

      speechSynthesis.cancel()

      const utterance = new SpeechSynthesisUtterance(text)
      utterance.lang = 'ja-JP'
      utterance.rate = 1.0
      utterance.volume = 1.0

      if (selectedVoice) {
        utterance.voice = selectedVoice
      }

      speechSynthesis.speak(utterance)
    }

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60)
      const secs = seconds % 60
      return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`
    }

    function startTimer() {
      elements.timer.style.display = 'flex'
      elapsedTime = 0
      elements.timerValue.textContent = formatTime(elapsedTime)
      timerInterval = setInterval(() => {
        elapsedTime++
        elements.timerValue.textContent = formatTime(elapsedTime)
      }, 1000)
    }

    function stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval)
        timerInterval = null
      }
    }

    function shuffleArray(array) {
      const shuffled = [...array]
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1))
        ;[shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]]
      }
      return shuffled
    }

    function getSelectedCategories() {
      const categories = []
      const checkboxes = document.querySelectorAll('.category-selector input[type="checkbox"]')
      checkboxes.forEach(cb => {
        if (cb.checked) {
          categories.push(cb.id)
        }
      })
      return categories
    }

    function loadData() {
      stopTimer()
      const selectedCategories = getSelectedCategories()
      
      if (selectedCategories.length === 0) {
        alert('请选择至少一个假名类型')
        return
      }

      currentData = []
      for (const category of selectedCategories) {
        if (category === 'favorites') {
          const favorites = getFavorites()
          if (favorites.length > 0) {
            currentData.push(...favorites)
          }
        } else if (kanaData[category]) {
          currentData.push(...kanaData[category])
        }
      }

      if (currentData.length > 0) {
        currentData = shuffleArray(currentData)
        currentIndex = 0
        displayCurrent()
        startTimer()
        elements.startBtn.textContent = '重新开始'
        elements.progressArea.style.display = 'block'
        updateProgress()
      } else {
        alert('请选择至少一个假名类型或添加收藏')
      }
    }

    function displayCurrent() {
      if (currentData.length === 0 || currentIndex >= currentData.length) {
        return
      }

      const item = currentData[currentIndex]
      showTop = Math.random() > 0.5

      if (showTop) {
        elements.topDisplay.textContent = item.romaji
        elements.bottomDisplay.textContent = '?'
        elements.bottomDisplay.className = 'display-text hidden'
      } else {
        elements.topDisplay.textContent = item.kana
        elements.bottomDisplay.textContent = '?'
        elements.bottomDisplay.className = 'display-text hidden'
      }

      elements.topPlaceholder.style.display = 'none'
      elements.topDisplay.style.display = 'block'
      elements.topSpeaker.style.display = 'none'

      elements.bottomPlaceholder.style.display = 'none'
      elements.bottomDisplay.style.display = 'block'
      elements.bottomSpeaker.style.display = 'none'
      elements.favoriteBtn.style.display = 'none'

      elements.bottomCard.className = 'card bottom-card'
      elements.answerBtn.disabled = false
      elements.nextBtn.disabled = true
    }

    function revealAnswer() {
      if (currentData.length === 0 || currentIndex >= currentData.length) {
        return
      }

      const item = currentData[currentIndex]
      
      if (showTop) {
        elements.bottomDisplay.textContent = item.kana
        elements.bottomDisplay.className = 'display-text'
        elements.bottomSpeaker.style.display = 'flex'
      } else {
        elements.bottomDisplay.textContent = item.romaji
        elements.bottomDisplay.className = 'display-text'
        elements.topSpeaker.style.display = 'flex'
      }
      
      elements.bottomCard.className = 'card bottom-card revealed'
      console.log('Before showing favorite button')
      console.log('favoriteBtn:', elements.favoriteBtn)
      elements.favoriteBtn.style.display = 'flex'
      console.log('After setting display to flex')
      updateFavoriteBtn(item)

      stopTimer()
      speak(item.kana)

      elements.answerBtn.disabled = true
      elements.nextBtn.disabled = false
    }

    function updateFavoriteBtn(item) {
      if (isFavorited(item)) {
        elements.favoriteBtn.textContent = '⭐'
        elements.favoriteBtn.classList.add('favorited')
      } else {
        elements.favoriteBtn.textContent = '☆'
        elements.favoriteBtn.classList.remove('favorited')
      }
    }

    function nextQuestion() {
      if (currentIndex < currentData.length - 1) {
        currentIndex++
        displayCurrent()
        startTimer()
        updateProgress()
      } else {
        alert('恭喜！你已完成所有练习！')
        loadData()
      }
    }

    function updateProgress() {
      elements.progressText.textContent = `进度: ${currentIndex + 1} / ${currentData.length}`
      const percentage = ((currentIndex + 1) / currentData.length) * 100
      elements.progressFill.style.width = percentage + '%'
    }

    elements.startBtn.addEventListener('click', loadData)
    elements.answerBtn.addEventListener('click', revealAnswer)
    elements.nextBtn.addEventListener('click', nextQuestion)
    elements.topSpeaker.addEventListener('click', () => {
      if (currentData[currentIndex]) {
        speak(currentData[currentIndex].kana)
      }
    })
    elements.bottomSpeaker.addEventListener('click', () => {
      if (currentData[currentIndex]) {
        speak(currentData[currentIndex].kana)
      }
    })
    elements.favoriteBtn.addEventListener('click', () => {
      if (currentData[currentIndex]) {
        const item = currentData[currentIndex]
        toggleFavorite(item)
        updateFavoriteBtn(item)
      }
    })

    checkSpeechAPI()
  </script>
</body>
</html>
